# =============================================================================
# docker-compose.yml  (project root)
# Services: backend (FastAPI) · redis · nginx (reverse proxy + frontend)
#
# ┌─────────────┐     ┌─────────────┐     ┌─────────────┐
# │   Browser   │────▶│    nginx    │────▶│   backend   │
# └─────────────┘     └─────────────┘     └──────┬──────┘
#                                                 │
#                                          ┌──────▼──────┐
#                                          │    redis    │
#                                          └─────────────┘
#
# Volumes:
#   model-data  → GGUF model file (read-only in backend)    [Uwaid populates]
#   db-data     → SQLite sessions.db persistence
#   redis-data  → Redis RDB snapshot persistence
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # REDIS — session store for horizontal scaling
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # BACKEND — FastAPI + llama-cpp-python + local STT/TTS
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_PATH=/models/qwen2.5-3b-instruct-q4_k_m.gguf
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - PYTHONUNBUFFERED=1
    volumes:
      - db-data:/data
      - ./models:/models:ro
    networks:
      - internal
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # FRONTEND DEV — Vite dev server with HMR (Rayan: use this for development)
  #   docker compose up frontend-dev
  #   → React app at http://localhost:3000
  #   → All /api + /ws + /auth traffic proxied to backend:8000
  # ---------------------------------------------------------------------------
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app          # live source mounts — HMR works
      - /app/node_modules        # anonymous volume so host node_modules don't shadow
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # FRONTEND PROD — multi-stage build → nginx serving /dist
  #   docker compose up frontend
  #   → Optimised static bundle at http://localhost:8080
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # NGINX reverse proxy (production only)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  redis-data:
  db-data: