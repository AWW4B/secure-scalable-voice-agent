worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # Docker's embedded DNS resolver.
        # Using a variable for proxy_pass defers DNS lookup to request time,
        # so nginx starts successfully even when backend isn't ready yet.
        resolver 127.0.0.11 valid=10s ipv6=off;

        set $backend_url http://backend:8000;

        # ----------------------------------------------------------------
        # API — REST endpoints
        # ----------------------------------------------------------------
        location ~ ^/(api|auth|session|sessions|health|reset|chat|benchmark|debug)(/.*)?$ {
            proxy_pass         $backend_url$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 2m;
        }

        # ----------------------------------------------------------------
        # WebSocket — binary audio channel /ws/chat
        # ----------------------------------------------------------------
        location /ws/ {
            proxy_pass         $backend_url$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ----------------------------------------------------------------
        # Frontend — SPA static files
        # ----------------------------------------------------------------
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}

